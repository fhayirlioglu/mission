launch:

  # Launch file arguments
  - arg:
      name: use_sim
      default: false
      description: "Use simulation environment"

  - arg:
      name: use_rviz
      default: true
      description: "Launch RViz for visualization"

  - arg:
      name: mavros_config
      default: $(find-pkg-share blue_description)/config/custom_rov/mavros.yaml
      description: "MAVROS configuration file"

  - arg:
      name: ardusub_params
      default: $(find-pkg-share blue_description)/config/custom_rov/ardusub.parm
      description: "ArduSub parameters file"

  - arg:
      name: localization_config
      default: $(find-pkg-share blue_description)/config/custom_rov/localization.yaml
      description: "Localization configuration file"

  - arg:
      name: camera_calibration
      default: $(find-pkg-share blue_description)/config/custom_rov/camera_calibration.yaml
      description: "Camera calibration file"

  - let:
      name: robot_description
      value: |
        <?xml version="1.0"?>
        <robot name="custom_rov" xmlns:xacro="http://ros.org/wiki/xacro">
          <!-- Base link -->
          <link name="base_link">
            <visual>
              <geometry>
                <box size="0.45 0.32 0.18"/>
              </geometry>
              <material name="blue">
                <color rgba="0.2 0.4 0.8 1.0"/>
              </material>
            </visual>
            <collision>
              <geometry>
                <box size="0.45 0.32 0.18"/>
              </geometry>
            </collision>
          </link>
          
          <!-- Camera link -->
          <link name="camera_link">
            <visual>
              <geometry>
                <box size="0.02 0.08 0.02"/>
              </geometry>
              <material name="black">
                <color rgba="0.1 0.1 0.1 1.0"/>
              </material>
            </visual>
          </link>
          
          <joint name="camera_joint" type="fixed">
            <parent link="base_link"/>
            <child link="camera_link"/>
            <origin xyz="0.20 0.0 0.0" rpy="0 0 0"/>
          </joint>
          
          <!-- Ping sonar link -->
          <link name="ping_sonar_link">
            <visual>
              <geometry>
                <cylinder radius="0.025" length="0.10"/>
              </geometry>
              <material name="yellow">
                <color rgba="1.0 1.0 0.0 1.0"/>
              </material>
            </visual>
          </link>
          
          <joint name="ping_sonar_joint" type="fixed">
            <parent link="base_link"/>
            <child link="ping_sonar_link"/>
            <origin xyz="0.0 0.0 0.15" rpy="0 0 0"/>
          </joint>
          
          <!-- Depth sensor link -->
          <link name="depth_sensor_link">
            <visual>
              <geometry>
                <box size="0.01 0.01 0.005"/>
              </geometry>
              <material name="green">
                <color rgba="0.0 1.0 0.0 1.0"/>
              </material>
            </visual>
          </link>
          
          <joint name="depth_sensor_joint" type="fixed">
            <parent link="base_link"/>
            <child link="depth_sensor_link"/>
            <origin xyz="0.0 0.0 -0.10" rpy="0 0 0"/>
          </joint>
          
          <!-- Sonar frames -->
          <link name="sonar_down"/>
          <joint name="sonar_down_joint" type="fixed">
            <parent link="ping_sonar_link"/>
            <child link="sonar_down"/>
            <origin xyz="0 0 0" rpy="0 1.57 0"/>
          </joint>
          
          <link name="sonar_front"/>
          <joint name="sonar_front_joint" type="fixed">
            <parent link="ping_sonar_link"/>
            <child link="sonar_front"/>
            <origin xyz="0 0 0" rpy="0 0 0"/>
          </joint>
        </robot>

  # Static transforms
  - node:
      pkg: tf2_ros
      exec: static_transform_publisher
      name: map_to_odom
      args: --frame-id map --child-frame-id odom --x 0 --y 0 --z 0 --qx 0 --qy 0 --qz 0 --qw 1

  - node:
      pkg: tf2_ros
      exec: static_transform_publisher
      name: odom_to_base_link
      args: --frame-id odom --child-frame-id base_link --x 0 --y 0 --z 0 --qx 0 --qy 0 --qz 0 --qw 1

  # Robot state publisher
  - node:
      pkg: robot_state_publisher
      exec: robot_state_publisher
      param:
        - name: robot_description
          value: $(var robot_description)
        - name: use_sim_time
          value: $(var use_sim)

  # MAVROS node
  - node:
      pkg: mavros
      exec: mavros_node
      name: mavros
      param_file: $(var mavros_config)
      param:
        - name: use_sim_time
          value: $(var use_sim)
      remapping:
        - from: /mavros/imu/data
          to: /imu/data
        - from: /mavros/local_position/pose
          to: /pose
        - from: /mavros/local_position/velocity_local
          to: /velocity

  # Camera node
  - node:
      pkg: usb_cam
      exec: usb_cam_node_exe
      name: camera
      param_file: $(var localization_config)
      param:
        - name: use_sim_time
          value: $(var use_sim)
      remapping:
        - from: /image_raw
          to: /camera/image_raw
        - from: /camera_info
          to: /camera/camera_info

  # Camera calibration publisher
  - node:
      pkg: camera_calibration_parsers
      exec: camera_calibration_parser
      name: camera_calibration_publisher
      param_file: $(var camera_calibration)

  # Ping sonar node (custom implementation needed)
  - node:
      pkg: ping_sonar_driver  # Bu paketi oluşturmanız gerekiyor
      exec: ping_sonar_node
      name: ping_sonar
      param_file: $(var localization_config)
      param:
        - name: use_sim_time
          value: $(var use_sim)

  # Bar30 depth sensor - Pixhawk üzerinden MAVROS ile gelir
  # Ayrı driver node'u gerekmez, MAVROS otomatik olarak yayınlar:
  # - /mavros/altitude/altitude
  # - /mavros/global_position/rel_alt
  # - /mavros/imu/atm_pressure

  # Visual odometry node
  - node:
      pkg: rtabmap_odom
      exec: rgbd_odometry
      name: visual_odometry
      param:
        - name: use_sim_time
          value: $(var use_sim)
        - name: frame_id
          value: base_link
        - name: odom_frame_id
          value: odom
        - name: subscribe_rgb
          value: true
        - name: subscribe_depth
          value: false
        - name: subscribe_scan
          value: false
      remapping:
        - from: /rgb/image
          to: /camera/image_raw
        - from: /rgb/camera_info
          to: /camera/camera_info
        - from: /odom
          to: /visual_odometry/odometry

  # ArUco detection node
  - node:
      pkg: aruco_ros
      exec: single
      name: aruco_single
      param_file: $(var localization_config)
      param:
        - name: use_sim_time
          value: $(var use_sim)
      remapping:
        - from: /image
          to: /camera/image_raw
        - from: /camera_info
          to: /camera/camera_info
        - from: /aruco_single/pose
          to: /aruco_detection/pose

  # Sensor fusion node (EKF)
  - node:
      pkg: robot_localization
      exec: ekf_node
      name: ekf_filter_node
      param:
        - name: use_sim_time
          value: $(var use_sim)
        - name: frequency
          value: 30.0
        - name: sensor_timeout
          value: 0.1
        - name: two_d_mode
          value: false
        - name: transform_time_offset
          value: 0.0
        - name: transform_timeout
          value: 0.0
        - name: print_diagnostics
          value: true
        - name: debug
          value: false
        
        # Sensor inputs
        - name: odom0
          value: /visual_odometry/odometry
        - name: odom0_config
          value: [false, false, false,
                  false, false, false,
                  true,  true,  false,
                  false, false, true,
                  false, false, false]
        - name: odom0_differential
          value: false
        - name: odom0_relative
          value: true
        
        - name: imu0
          value: /imu/data
        - name: imu0_config
          value: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  true,  true,  true]
        - name: imu0_differential
          value: false
        - name: imu0_relative
          value: true
        - name: imu0_remove_gravitational_acceleration
          value: true
        
        - name: pose0
          value: /aruco_detection/pose
        - name: pose0_config
          value: [true,  true,  true,
                  false, false, true,
                  false, false, false,
                  false, false, false,
                  false, false, false]
        - name: pose0_differential
          value: false
        - name: pose0_relative
          value: false

      remapping:
        - from: /odometry/filtered
          to: /odometry/filtered

  # Joystick teleop (opsiyonel)
  - node:
      pkg: joy
      exec: joy_node
      name: joy
      param:
        - name: dev
          value: /dev/input/js0
        - name: deadzone
          value: 0.3
        - name: autorepeat_rate
          value: 20.0

  - node:
      pkg: teleop_twist_joy
      exec: teleop_node
      name: teleop_twist_joy
      param:
        - name: axis_linear.x
          value: 1
        - name: axis_linear.y
          value: 0
        - name: axis_linear.z
          value: 4
        - name: axis_angular.yaw
          value: 3
        - name: scale_linear
          value: 1.0
        - name: scale_angular
          value: 1.0
        - name: enable_button
          value: 0
      remapping:
        - from: /cmd_vel
          to: /mavros/setpoint_velocity/cmd_vel_unstamped

  # RViz visualization
  - node:
      pkg: rviz2
      exec: rviz2
      if: $(var use_rviz)
      args: -d $(find-pkg-share blue_description)/rviz/custom_rov.rviz
      param:
        - name: use_sim_time
          value: $(var use_sim)

  # Diagnostic aggregator
  - node:
      pkg: diagnostic_aggregator
      exec: aggregator_node
      name: diagnostic_aggregator
      param:
        - name: use_sim_time
          value: $(var use_sim)
        - name: pub_rate
          value: 1.0
        - name: base_path
          value: ""
        - name: analyzers.sensors.type
          value: diagnostic_aggregator/AnalyzerGroup
        - name: analyzers.sensors.path
          value: Sensors
        - name: analyzers.sensors.analyzers.camera.type
          value: diagnostic_aggregator/GenericAnalyzer
        - name: analyzers.sensors.analyzers.camera.path
          value: Camera
        - name: analyzers.sensors.analyzers.camera.contains
          value: ['camera'] 